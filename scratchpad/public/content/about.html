<div class="about-content">
  <h2 class="section-title">About</h2>
  <p class="section-title muted">Version 1.2.3</p>
  <p>
    This is an application for tasks with the App Shell architecture: the shell
    is loaded immediately, and the pages from <code>/content/</code> are loaded
    separately.
  </p>
  <p>
    The data is stored in <code>localStorage</code>, the static and content are
    cached by the Service Worker.
  </p>
</div>
