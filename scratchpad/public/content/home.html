<div class="home-content">
  <form id="note-form" class="task-form">
    <input
      class="task-input"
      type="text"
      id="note-input"
      placeholder="Enter a task"
      required
      autocomplete="off"
    />
    <input
      type="datetime-local"
      id="new-task-reminder"
      class="visually-hidden"
      tabindex="-1"
      aria-hidden="true"
    />
    <button
      type="button"
      class="task-form__reminder-pill task-form__reminder-pill--muted"
      id="new-task-reminder-trigger"
    >
      Add reminder
    </button>
    <button class="btn" type="submit">Add task</button>
  </form>
  <ul id="notes-list" class="task-list"></ul>
</div>
